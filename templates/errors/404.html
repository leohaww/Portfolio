{% extends "base.html" %}
{% block title %}404 — Not Found{% endblock %}
{% block body_class %}error-page{% endblock %}

{% block layout %}
<div class="error__wrap">
  <div class="error__code">404</div>
  <h1 class="error__title">Page Not Found</h1>
  <p class="error__sub">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('index') }}" class="btn btn--primary">← Back to Portfolio</a>
</div>
{% endblock %}
