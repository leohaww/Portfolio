{% extends "base.html" %}
{% block title %}403 — Forbidden{% endblock %}
{% block body_class %}error-page{% endblock %}

{% block layout %}
<div class="error__wrap">
  <div class="error__code">403</div>
  <h1 class="error__title">Access Forbidden</h1>
  <p class="error__sub">You don't have permission to access this resource.</p>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn--primary">← Back to Dashboard</a>
</div>
{% endblock %}
