<header class="admin__topbar">
  <button class="topbar__toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
    <i class="fas fa-bars"></i>
  </button>

  <div class="topbar__breadcrumb">
    <span class="text--muted">Admin</span>
    <span class="text--muted">/</span>
    <span>{% block breadcrumb %}Dashboard{% endblock %}</span>
  </div>

  <div class="topbar__right">
    <a href="{{ url_for('admin_messages') }}" class="topbar__icon-btn" title="Messages">
      <i class="fas fa-envelope"></i>
      {% if unread_messages > 0 %}
      <span class="topbar__dot">{{ unread_messages }}</span>
      {% endif %}
    </a>
    <a href="{{ url_for('index') }}" target="_blank" class="topbar__icon-btn" title="View Site">
      <i class="fas fa-external-link-alt"></i>
    </a>
    <div class="topbar__avatar">{{ session.name[0] | upper }}</div>
  </div>
</header>
